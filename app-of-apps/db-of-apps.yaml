apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-db
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/kforetas/petclinic-gitops'
    targetRevision: HEAD
    path: apps/db
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
